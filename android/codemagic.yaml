# codemagic.yaml
# Put this file in your /android folder root
# Codemagic reads this to build your APK automatically

workflows:
  bandhan-android-release:
    name: Bandhan Android Release
    max_build_duration: 60
    environment:
      android_signing:
        - bandhan_keystore        # Create this in Codemagic → Teams → Code signing
      groups:
        - bandhan_credentials     # Create this in Codemagic → Teams → Environment variables
      node: v20.0.0
      java: 17

    scripts:
      - name: Set app version
        script: |
          BUILD_NUMBER=$(($(google-play get-latest-build-number \
            --package-name "app.bandhan.matrimony" \
            --tracks=alpha) + 1))
          echo "Build: $BUILD_NUMBER"

      - name: Build Release AAB
        script: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease \
            -PversionCode=$BUILD_NUMBER \
            -PversionName="1.0.$BUILD_NUMBER"

    artifacts:
      - android/app/build/outputs/bundle/**/*.aab
      - android/app/build/outputs/apk/**/*.apk

    publishing:
      email:
        recipients:
          - your@email.com       # ← Change to your email
        notify:
          success: true
          failure: true
